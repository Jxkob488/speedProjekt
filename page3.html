<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Party Countdown</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="script.js?v=6" defer></script>
</head>
<body data-step="3">
<div class="ambient" aria-hidden="true"></div>
<div class="pattern-layer" aria-hidden="true"></div>
<div class="beach-layer" aria-hidden="true">
    <span class="beach-sun"></span>
    <span class="beach-wave wave-a"></span>
    <span class="beach-wave wave-b"></span>
    <span class="palm-stripe palm-a"></span>
    <span class="palm-stripe palm-b"></span>
</div>
<div class="lightshow" aria-hidden="true"></div>
<div class="particles" aria-hidden="true"></div>
<canvas id="threejs-canvas" class="threejs-bg" aria-hidden="true"></canvas>

<main class="intro-screen" aria-label="Intro 3 von 4">
    <h1>Neon Shore</h1>
</main>
</body>
</html>
